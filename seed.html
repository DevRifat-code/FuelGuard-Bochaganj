<!DOCTYPE html>

<head>

<body>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBnLN4HprmXCfCOh4IIfIoeoA8WJpIo9kA",
      authDomain: "fuelguard-bochaganj.firebaseapp.com",
      projectId: "fuelguard-bochaganj",
      storageBucket: "fuelguard-bochaganj.firebasestorage.app",
      messagingSenderId: "1060481740844",
      appId: "1:1060481740844:web:caf45fadbce72459962189"

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore(app);

    async function seed() {
      const status = document.getElementById('status');
      const result = document.getElementById('result');
      const btn = document.getElementById('btn');
      
      btn.disabled = true;
      status.textContent = 'Hashing passwords...';
      
      try {
        const bcrypt = dcodeIO.bcrypt;
        
        const adminHash = bcrypt.hashSync('admin123', 10);
        const managerHash = bcrypt.hashSync('manager123', 10);
        const ownerHash = bcrypt.hashSync('owner123', 10);
        
        status.textContent = 'Creating admin...';
        
        // Check admin
        const adminSnap = await db.collection('users').where('username', '==', 'uno_admin@gmail.com').get();
        if (adminSnap.empty) {
          await db.collection('users').add({
            username: 'uno_admin@gmail.com',
            passwordHash: adminHash,
            role: 'admin',
            fullName: 'UNO Admin',
            phone: '01700000000',
            stationId: null,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          status.textContent = '✓ Admin created';
        } else {
          status.textContent = '✓ Admin exists';
        }
        
        // Check manager
        const managerSnap = await db.collection('users').where('username', '==', 'manager_bakultala').get();
        let ownerId;
        
        if (managerSnap.empty) {
          await db.collection('users').add({
            username: 'manager_bakultala',
            passwordHash: managerHash,
            role: 'manager',
            fullName: 'Manager Bakultala',
            phone: '01711111111',
            stationId: 'bakultala-station',

          });

        // Check owner
        const ownerSnap = await db.collection('users').where('username', '==', 'owner_karim').get();
        
        if (ownerSnap.empty) {
          const ownerRef = await db.collection('users').add({
            username: 'owner_karim',
            passwordHash: ownerHash,
            role: 'owner',
            fullName: 'Karim Uddin',
            phone: '01722222222',
            stationId: null,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          ownerId = ownerRef.id;
          status.textContent = '✓ Owner created';
        } else {
          ownerId = ownerSnap.docs[0].id;
          status.textContent = '✓ Owner exists';
        }
        
        // Check station
        const stationSnap = await db.collection('stations').where('name', '==', 'Bakultala Fuel Station').get();
        
        if (stationSnap.empty) {
          await db.collection('stations').add({
            name: 'Bakultala Fuel Station',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          status.textContent = '✓ Station created';
        } else {
          status.textContent = '✓ Station exists';
        }
        
        // Check vehicle
        const vehicleSnap = await db.collection('vehicles').where('regNo', '==', 'DHA-123456').get();
        
        if (vehicleSnap.empty) {
          await db.collection('vehicles').add({
            ownerUserId: ownerId,
            regNo: 'DHA-123456',
            ownerName: 'Karim Uddin',
            phone: '01722222222',
            nid: '1234567890123',
            licenseNo: 'DL-789012',
            vehicleType: 'motorcycle',
            taxToken: 'TXN-12345',
            passportPhoto: null,

            licensePhoto: null,

        result.innerHTML = '✅ <b>Seed complete!</b><br><br>' +

      } catch (error) {

  </script>
</body>
</html>
